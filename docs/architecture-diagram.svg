<svg viewBox="0 0 1000 740" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6c757d"/>
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M10,0 L0,5 L10,10 z" fill="#6c757d"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="740" fill="#fafafa"/>

  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1f26">Kramly — System Architecture</text>
  <text x="500" y="52" text-anchor="middle" font-size="12" fill="#6c757d">One Neo4j Aura graph, three components reasoning over it, one governed write path</text>

  <!-- Extraction Pipeline -->
  <rect x="120" y="65" width="280" height="70" rx="6" fill="#22303f" stroke="#3d4f63" stroke-width="1.5"/>
  <text x="260" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Extraction Pipeline</text>
  <text x="260" y="108" text-anchor="middle" font-size="10.5" fill="#a9b6c4">graph/extraction/pipeline.py</text>
  <text x="260" y="122" text-anchor="middle" font-size="10.5" fill="#a9b6c4">LLM proposes candidate edges from text</text>

  <!-- Review Governance -->
  <rect x="600" y="65" width="280" height="70" rx="6" fill="#22303f" stroke="#c9962c" stroke-width="2"/>
  <text x="740" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Human-in-the-Loop Review</text>
  <text x="740" y="108" text-anchor="middle" font-size="10.5" fill="#e3caa0">backend/review/</text>
  <text x="740" y="122" text-anchor="middle" font-size="10.5" fill="#e3caa0">PENDING → APPROVED → MERGED, cycle-checked</text>

  <!-- Extraction -> Review -->
  <line x1="400" y1="100" x2="596" y2="100" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="93" text-anchor="middle" font-size="10" fill="#6c757d">propose</text>

  <!-- Skill Dependency Graph (hub) -->
  <rect x="300" y="175" width="400" height="80" rx="6" fill="#1a2a1f" stroke="#4c9a5c" stroke-width="2"/>
  <text x="500" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Skill Dependency Graph</text>
  <text x="500" y="221" text-anchor="middle" font-size="11" fill="#a9c9b0">Neo4j Aura</text>
  <text x="500" y="238" text-anchor="middle" font-size="10.5" fill="#a9c9b0">Skill nodes · PREREQUISITE_OF edges · Learner / Resource / Decision data</text>

  <!-- Review -> Graph (one-way, governed merge) -->
  <path d="M740,135 L660,175" fill="none" stroke="#c9962c" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="770" y="158" text-anchor="middle" font-size="10" fill="#8a6a1f">approved edges only</text>

  <!-- Middle row: Optimizer / Agent Layer / Marketplace -->
  <rect x="40" y="320" width="270" height="140" rx="6" fill="#22303f" stroke="#3d4f63" stroke-width="1.5"/>
  <text x="175" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Optimizer</text>
  <text x="175" y="364" text-anchor="middle" font-size="10.5" fill="#a9b6c4">(deterministic)</text>
  <text x="175" y="386" text-anchor="middle" font-size="10.5" fill="#a9b6c4">Kahn's algorithm topo sort</text>
  <text x="175" y="404" text-anchor="middle" font-size="10.5" fill="#a9b6c4">Decay model</text>
  <text x="175" y="422" text-anchor="middle" font-size="10.5" fill="#a9b6c4">Calibration (OLS regression)</text>

  <rect x="365" y="313" width="270" height="154" rx="6" fill="#2c1a1f" stroke="#e63946" stroke-width="2.5"/>
  <text x="500" y="341" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Agent Layer</text>
  <text x="500" y="357" text-anchor="middle" font-size="10.5" fill="#f0b8bd">observe → reason → act</text>
  <text x="500" y="379" text-anchor="middle" font-size="10.5" fill="#f0b8bd">Action space (6 actions)</text>
  <text x="500" y="397" text-anchor="middle" font-size="10.5" fill="#f0b8bd">Grounded LLM controller</text>
  <text x="500" y="415" text-anchor="middle" font-size="10.5" fill="#f0b8bd">Executor + deterministic fallback</text>
  <text x="500" y="433" text-anchor="middle" font-size="10.5" fill="#f0b8bd">Runs autonomously on a schedule</text>
  <text x="500" y="454" text-anchor="middle" font-size="9.5" font-style="italic" fill="#e63946">the centerpiece</text>

  <rect x="690" y="320" width="270" height="140" rx="6" fill="#22303f" stroke="#3d4f63" stroke-width="1.5"/>
  <text x="825" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Marketplace</text>
  <text x="825" y="364" text-anchor="middle" font-size="10.5" fill="#a9b6c4">resource ingestion</text>
  <text x="825" y="386" text-anchor="middle" font-size="10.5" fill="#a9b6c4">LLM-grounded concept extraction</text>
  <text x="825" y="404" text-anchor="middle" font-size="10.5" fill="#a9b6c4">Similarity / duplicate detection</text>
  <text x="825" y="422" text-anchor="middle" font-size="10.5" fill="#a9b6c4">Quality scoring</text>

  <!-- Graph <-> middle row (bidirectional read/write) -->
  <path d="M400,255 L200,318" fill="none" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <line x1="500" y1="255" x2="500" y2="311" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <path d="M600,255 L800,318" fill="none" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>

  <!-- FastAPI Backend -->
  <rect x="40" y="500" width="920" height="70" rx="6" fill="#22303f" stroke="#3d4f63" stroke-width="1.5"/>
  <text x="500" y="530" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">FastAPI Backend</text>
  <text x="500" y="548" text-anchor="middle" font-size="10.5" fill="#a9b6c4">api/routes.py · api/review_routes.py · marketplace/api.py</text>

  <!-- middle row <-> backend -->
  <path d="M200,460 L230,498" fill="none" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <line x1="500" y1="467" x2="500" y2="498" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <path d="M800,460 L770,498" fill="none" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>

  <!-- Frontend -->
  <rect x="300" y="610" width="400" height="70" rx="6" fill="#22303f" stroke="#3d4f63" stroke-width="1.5"/>
  <text x="500" y="640" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">React + Vite Frontend</text>
  <text x="500" y="658" text-anchor="middle" font-size="10.5" fill="#a9b6c4">Home · Learning Path · Marketplace · Audit Log · Skill Graph</text>

  <!-- backend <-> frontend -->
  <line x1="500" y1="570" x2="500" y2="608" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>

  <text x="500" y="715" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6c757d">
    Four autonomous background jobs (decay scan, agentic cycle, crowd-confidence rescan, quality calibration) run on independent
  </text>
  <text x="500" y="730" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6c757d">
    schedules against this same graph — the agent layer acts without a request ever hitting the backend.
  </text>
</svg>
